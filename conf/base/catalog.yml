# Датасеты, которыми обмениваются узлы пайплайна.
# Пути берутся из globals.yml через встроенный резолвер ${globals:...}.

# --- Входные данные ---

# Датасет математических задач
math_problems:
  type: pandas.ParquetDataset
  filepath: ${globals:raw_dir}/sample.parquet

# База примеров для RAG (условие/решение/ответ/тема)
rag_examples:
  type: pandas.ParquetDataset
  filepath: ${globals:raw_dir}/examples.parquet

# Схема колонок (из sources.yml) — узлы читают как обычный словарь
sources:
  type: yaml.YAMLDataset
  filepath: conf/base/sources.yml

# --- Выходные данные ---

# Выход агента: по строке на задачу
agent_results:
  type: pandas.CSVDataset
  filepath: ${globals:output_dir}/agent_results.csv
  save_args:
    index: false

# Полная трасса лупа (сообщения, tool_calls, извлечённые подсказки) — для анализа
agent_traces:
  type: json.JSONDataset
  filepath: ${globals:output_dir}/agent_traces.json

# Метрики оценки (accuracy и т.п.)
eval_report:
  type: json.JSONDataset
  filepath: ${globals:metrics_dir}/eval_report.json

# Сводка прогона бенчмарков (пишет узел run_benchmarks): run_id, статусы, manifest
benchmark_run_summary:
  type: json.JSONDataset
  filepath: ${globals:output_dir}/benchmark_run_summary.json

# Результат опциональной публикации прогона в LangSmith (узел publish_to_langsmith)
langsmith_publish_result:
  type: json.JSONDataset
  filepath: ${globals:output_dir}/langsmith_publish_result.json
