name: Deploy LangSmith renderer

on:
  push:
    branches: [main]
    paths:
      - "src/langsmith/renderer/**"
      - ".github/workflows/renderer-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload renderer
        uses: actions/upload-pages-artifact@v4
        with:
          path: src/langsmith/renderer

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4